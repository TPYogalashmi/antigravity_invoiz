# ==========================================
# APPLICATION
# ==========================================
spring.application.name=billing-crm-backend
server.port=8080
server.servlet.context-path=/api

# ==========================================
# DATABASE — MySQL
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/billing_crm?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# ==========================================
# SECURITY — JWT
# ==========================================
app.jwt.secret=7b4f2e8a1c9d3b6e0f5a2c8e4d1b7f9a3c6e2b8d0f4a7c1e5b3d9f2a6c4e8b1d5
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ==========================================
# CORS
# ==========================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# ==========================================
# AI SERVICE
# ==========================================
app.ai-service.base-url=http://localhost:5000/api

# ==========================================
# ACTUATOR
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ==========================================
# SPRINGDOC / SWAGGER
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ==========================================
# LOGGING
# ==========================================
logging.level.com.billingcrm=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n